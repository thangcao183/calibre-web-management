<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/reader.css">
    <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>
<body data-book-id="{{ book_id }}">

<div id="topbar">
    <div class="bar-left">
        <button class="btn" id="btn-back" title="Back">← Back</button>
        <button class="btn" id="btn-toc-toggle" title="Table of Contents">☰</button>
        <span id="book-title">{{ title }}</span>
        <span id="progress"></span>
    </div>
    <div class="bar-right">
        <button class="btn" id="btn-font-dec" title="Decrease font">A−</button>
        <span id="font-val">100%</span>
        <button class="btn" id="btn-font-inc" title="Increase font">A+</button>
        <select class="btn" id="sel-theme" title="Theme">
            <option value="dark">🌙 Dark</option>
            <option value="sepia">📜 Sepia</option>
            <option value="light">☀️ Light</option>
        </select>
        <select class="btn" id="sel-font" title="Font">
            <option value="'Lora', Georgia, serif">Lora</option>
            <option value="'Noto Serif', serif">Noto Serif</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="system-ui, sans-serif">System</option>
        </select>
    </div>
</div>

<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="reader-wrap container">
    <button class="nav-btn" id="prev-btn">‹</button>
    <div id="reader"><div id="loader"><div class="spinner"></div>Loading...</div></div>
    <button class="nav-btn" id="next-btn">›</button>
</div>

<!-- TOC -->
<div id="toc-overlay"></div>
<div id="toc-panel">
    <div id="toc-header">Table of Contents <button class="btn" id="btn-toc-close">✕</button></div>
    <div id="toc-list"></div>
</div>

<script src="/static/js/reader.js"></script>
</body>
</html>
