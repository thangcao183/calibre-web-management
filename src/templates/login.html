<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Calibre Web Management</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/static/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="card glass-card login-card text-center">
        <div class="mb-4">
            <span class="pulse-dot mx-auto mb-2"></span>
            <h3 class="fw-bold">Calibre Web</h3>
            <p class="text-secondary small">Automated Library Management</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} small py-2">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control bg-dark border-secondary" id="userInput" placeholder="Username" required>
                <label for="userInput">Username</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" name="password" class="form-control bg-dark border-secondary" id="passInput" placeholder="Password" required>
                <label for="passInput">Password</label>
            </div>
            <button type="submit" class="btn btn-warning w-100 py-2 fw-bold">Sign In</button>
        </form>
        
        <div class="mt-4 small text-secondary">
            Default credentials: <code>admin</code> / <code>admin</code>
        </div>
    </div>
</body>
</html>
