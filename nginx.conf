# =============================================================
# Nginx Configuration for UNCaGED Dashboard (calibre-web-management)
# =============================================================
# Usage:
#   1. Copy this file:  sudo cp nginx.conf /etc/nginx/sites-available/calibre-web
#   2. Enable site:     sudo ln -s /etc/nginx/sites-available/calibre-web /etc/nginx/sites-enabled/
#   3. Test config:     sudo nginx -t
#   4. Reload:          sudo systemctl reload nginx
#   5. Setup SSL:       sudo certbot --nginx -d kobo.yourdomain.com
# =============================================================

server {
    listen 80;
    listen [::]:80;
    server_name kobo.yourdomain.com;  # ← Change to your domain

    # ----- Client Upload Size (match MAX_UPLOAD_MB in .env) -----
    client_max_body_size 100M;

    # ----- Logging -----
    access_log /var/log/nginx/calibre-web-access.log;
    error_log  /var/log/nginx/calibre-web-error.log;

    # ----- Proxy to Waitress (port 5000) -----
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (generous for large book uploads)
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ----- Deny access to hidden files (.env, .git, etc.) -----
    location ~ /\. {
        deny all;
        return 404;
    }
}
